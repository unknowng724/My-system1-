<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> إدخال البيانات</title>
    <!-- Tailwind CSS for modern responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Font (Cairo) for premium Arabic typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Cairo', sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-tr from-slate-100 via-sky-50 to-emerald-50 flex items-center justify-center p-4 md:p-8">
    
    <!-- Main glassmorphism card -->
    <div class="w-full max-w-md bg-white/70 backdrop-blur-md rounded-2xl shadow-xl border border-white/40 p-6 md:p-8 transition-all duration-300">
      
      <!-- Logo and Header Section -->
      <div class="flex flex-col items-center mb-8">
        <!-- CUSTOM_LOGO_PLACEHOLDER: Replace the src URL with your uploaded logo image link -->
        <div class="w-24 h-24 rounded-full bg-white/90 p-2 shadow-md flex items-center justify-center mb-4 border border-slate-100 overflow-hidden">
          <img 
            id="logoDisplay" 
            src="https://drive.google.com/file/d/1J46zaRzvKyCkwQO4H8PQ7ykLu57Aj3zC/view?usp=drivesdk" 
            alt="الشعار" 
            class="w-full h-full object-contain"
            onerror="this.src='https://drive.google.com/file/d/1J46zaRzvKyCkwQO4H8PQ7ykLu57Aj3zC/view?usp=drivesdk"
          />
        </div>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight text-center">مرحباً بك في مكتبة الأمير </h1>
        <p class="text-sm text-slate-500 mt-1">يرجى ملء الحقول المطلوبة أدناه بدقة</p>
      </div>

      <!-- Form Starts Here -->
      <form id="dataForm" class="space-y-6" novalidate>
        
        <!-- Full Name (الاسم الثلاثي) - Arabic only, Mandatory -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
            الاسم الثلاثي <span class="text-red-500">*</span>
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
              <i class="fa-solid fa-user text-sm"></i>
            </span>
            <input
              type="text"
              id="fullName"
              name="الاسم الثلاثي"
              required
              placeholder="اكتب اسمك الثلاثي باللغة العربية"
              class="w-full pl-3 pr-10 py-2.5 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800"
            />
          </div>
          <p id="nameError" class="text-xs text-red-500 mt-1 hidden">الرجاء إدخال الاسم الثلاثي باللغة العربية فقط وبدون أرقام.</p>
        </div>

        <!-- Number of Copies (عدد النسخ) - Numeric only -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5 flex items-center gap-1">
            عدد النسخ <span class="text-red-500">*</span>
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400">
              <i class="fa-solid fa-copy text-sm"></i>
            </span>
            <input
              type="number"
              id="copiesCount"
              name="عدد النسخ"
              min="1"
              required
              placeholder="أدخل عدد النسخ المطلوبة"
              class="w-full pl-3 pr-10 py-2.5 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800"
            />
          </div>
          <p id="copiesError" class="text-xs text-red-500 mt-1 hidden">الرجاء إدخال عدد نسخ صحيح (رقم أكبر من 0).</p>
        </div>

        <!-- File Upload (رفع الملفات) - Optional but highly styled -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">تحميل المستند (اختياري)</label>
          <div class="relative border-2 border-dashed border-slate-200 hover:border-sky-400 rounded-xl bg-white/50 transition-colors duration-200">
            <input
              type="file"
              id="fileInput"
              class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
              accept="*/*"
            />
            <div class="p-4 flex flex-col items-center justify-center text-center">
              <span class="w-10 h-10 rounded-full bg-sky-50 flex items-center justify-center text-sky-600 mb-2">
                <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
              </span>
              <span class="text-xs font-semibold text-slate-600" id="fileBtnLabel">اختر ملفاً لرفعه...</span>
              <span class="text-[10px] text-slate-400 mt-1" id="fileNameDisplay">لم يتم اختيار أي ملف</span>
            </div>
          </div>
        </div>

        <!-- Notes (الملاحظات) - Arabic only, Max 20 words -->
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="text-sm font-semibold text-slate-700">ملاحظات إضافية (اختياري)</label>
            <span id="wordCounter" class="text-[10px] text-slate-400 font-medium">0 / 20 كلمة</span>
          </div>
          <textarea
            id="notes"
            name="الملاحظات"
            rows="3"
            placeholder="اكتب أي ملاحظات إضافية باللغة العربية (بحد أقصى 20 كلمة)..."
            class="w-full p-3 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800 resize-none"
          ></textarea>
          <p id="notesError" class="text-xs text-red-500 mt-1 hidden">يجب أن تكون الكتابة باللغة العربية فقط ولا تتجاوز 20 كلمة.</p>
        </div>

        <!-- Submission Feedback Message -->
        <div id="statusMessage" class="hidden p-3 rounded-xl text-center text-xs font-bold transition-all duration-300"></div>

        <!-- Form Buttons -->
        <div class="flex items-center gap-3 pt-2">
          <button
            type="submit"
            id="submitBtn"
            class="flex-1 py-3 bg-gradient-to-r from-sky-600 to-emerald-600 hover:from-sky-700 hover:to-emerald-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-sky-600/10 hover:shadow-sky-600/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          >
            <span id="submitText">إرسال البيانات</span>
            <span id="spinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
          </button>
          <button
            type="button"
            id="cancelBtn"
            class="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold text-sm rounded-xl active:scale-[0.98] transition-all"
          >
            إلغاء
          </button>
        </div>

      </form>
    </div>

    <!-- Script Section for Validations & API Integration -->
    <script>
      const form = document.getElementById("dataForm");
      const submitBtn = document.getElementById("submitBtn");
      const submitText = document.getElementById("submitText");
      const spinner = document.getElementById("spinner");
      const statusMessage = document.getElementById("statusMessage");
      const fileInput = document.getElementById("fileInput");
      const fileNameDisplay = document.getElementById("fileNameDisplay");
      const fileBtnLabel = document.getElementById("fileBtnLabel");
      const cancelBtn = document.getElementById("cancelBtn");

      // Validation Element References
      const fullNameInput = document.getElementById("fullName");
      const nameError = document.getElementById("nameError");
      const copiesInput = document.getElementById("copiesCount");
      const copiesError = document.getElementById("copiesError");
      const notesInput = document.getElementById("notes");
      const notesError = document.getElementById("notesError");
      const wordCounter = document.getElementById("wordCounter");

      // Replace this URL with your Google Apps Script Web App URL after deployment
      const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2_c3ubwJ1VALZHRTr9QnxdxK5GJvpha-k5GxyyJX08a0Xf6VMQ-madmZ5SeVhH2XaOA/exec";

      // File handling state
      let base64FileData = null;

      // Handle file selection and convert to Base64
      fileInput.addEventListener("change", function () {
        if (this.files && this.files.length > 0) {
          const file = this.files[0];
          fileNameDisplay.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
          fileBtnLabel.textContent = "تم اختيار الملف";
          
          const reader = new FileReader();
          reader.onload = function (e) {
            const splitData = e.target.result.split(",");
            base64FileData = {
              fileName: file.name,
              mimeType: splitData[0].match(/:(\w.+);/)[1],
              data: splitData[1]
            };
          };
          reader.readAsDataURL(file);
        } else {
          resetFileState();
        }
      });

      // Reset file selection helpers
      function resetFileState() {
        fileInput.value = "";
        fileNameDisplay.textContent = "لم يتم اختيار أي ملف";
        fileBtnLabel.textContent = "اختر ملفاً لرفعه...";
        base64FileData = null;
      }

      // Word count counter and validation for notes (Arabic-only, max 20 words)
      notesInput.addEventListener("input", function () {
        const text = this.value.trim();
        const words = text ? text.split(/\s+/) : [];
        const wordCount = words.length;
        
        wordCounter.textContent = `${wordCount} / 20 كلمة`;
        if (wordCount > 20) {
          wordCounter.classList.add("text-red-500");
          wordCounter.classList.remove("text-slate-400");
        } else {
          wordCounter.classList.remove("text-red-500");
          wordCounter.classList.add("text-slate-400");
        }
        validateNotesField();
      });

      // Regex validation helper for pure Arabic text & spaces
      function isArabicOnly(text) {
        const arabicRegex = /^[\u0600-\u06FF\s]+$/;
        return arabicRegex.test(text);
      }

      // Notes validator (allows numbers and common punctuation but no Latin letters)
      function isArabicNotesOnly(text) {
        if (!text) return true;
        const arabicNotesRegex = /^[\u0600-\u06FF\s0-9\d\.,،؛\?\!\(\)\[\]"'\-\_]+$/;
        return arabicNotesRegex.test(text);
      }

      // Validate the name input field
      function validateNameField() {
        const value = fullNameInput.value.trim();
        if (!value || !isArabicOnly(value)) {
          nameError.classList.remove("hidden");
          fullNameInput.classList.add("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          fullNameInput.classList.remove("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return false;
        } else {
          nameError.classList.add("hidden");
          fullNameInput.classList.remove("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          fullNameInput.classList.add("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return true;
        }
      }

      // Validate the copies count field
      function validateCopiesField() {
        const value = parseInt(copiesInput.value, 10);
        if (isNaN(value) || value <= 0) {
          copiesError.classList.remove("hidden");
          copiesInput.classList.add("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          copiesInput.classList.remove("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return false;
        } else {
          copiesError.classList.add("hidden");
          copiesInput.classList.remove("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          copiesInput.classList.add("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return true;
        }
      }

      // Validate the notes field
      function validateNotesField() {
        const value = notesInput.value.trim();
        const words = value ? value.split(/\s+/) : [];
        
        const isArabic = isArabicNotesOnly(value);
        const isValidWordCount = words.length <= 20;

        if (!isArabic || !isValidWordCount) {
          notesError.classList.remove("hidden");
          notesInput.classList.add("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          notesInput.classList.remove("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return false;
        } else {
          notesError.classList.add("hidden");
          notesInput.classList.remove("border-red-400", "focus:ring-red-500/20", "focus:border-red-500");
          notesInput.classList.add("border-slate-200", "focus:ring-sky-500/40", "focus:border-sky-500");
          return true;
        }
      }

      // Clear helper
      function resetUIFeedback() {
        statusMessage.classList.add("hidden");
        statusMessage.textContent = "";
        nameError.classList.add("hidden");
        copiesError.classList.add("hidden");
        notesError.classList.add("hidden");
        fullNameInput.className = "w-full pl-3 pr-10 py-2.5 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800";
        copiesInput.className = "w-full pl-3 pr-10 py-2.5 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800";
        notesInput.className = "w-full p-3 bg-white/90 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-500/40 focus:border-sky-500 transition-all text-sm text-slate-800 resize-none";
      }

      // Submit Form logic
      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        // Perform validation before submit
        const isNameValid = validateNameField();
        const isCopiesValid = validateCopiesField();
        const isNotesValid = validateNotesField();

        if (!isNameValid || !isCopiesValid || !isNotesValid) {
          showNotification("يرجى التحقق من صحة البيانات المدخلة قبل الإرسال.", "error");
          return;
        }

        // Show loading state
        submitBtn.disabled = true;
        spinner.classList.remove("hidden");
        submitText.textContent = "جاري إرسال البيانات...";
        statusMessage.classList.add("hidden");

        try {
          const payload = {
            "الاسم الثلاثي": fullNameInput.value.trim(),
            "عدد النسخ": parseInt(copiesInput.value, 10),
            "الملاحظات": notesInput.value.trim(),
            fileData: base64FileData
          };

          const response = await fetch(GOOGLE_SCRIPT_URL, {
            redirect: "follow",
            method: "POST",
            body: JSON.stringify(payload),
            headers: {
              "Content-Type": "text/plain;charset=utf-8",
            },
          });

          const result = await response.json();

          if (result.status === "success") {
            showNotification(result.message || "تم إرسال البيانات بنجاح، شكراً لتعاونكم!", "success");
            form.reset();
            resetFileState();
            wordCounter.textContent = "0 / 20 كلمة";
          } else {
            throw new Error(result.message || "فشلت عملية الإرسال.");
          }
        } catch (error) {
          console.error("Submission error:", error);
          showNotification("حدث خطأ أثناء الإرسال: " + error.message, "error");
        } finally {
          submitBtn.disabled = false;
          spinner.classList.add("hidden");
          submitText.textContent = "إرسال البيانات";
        }
      });

      // Clear/Cancel action
      cancelBtn.addEventListener("click", function () {
        form.reset();
        resetFileState();
        resetUIFeedback();
        wordCounter.textContent = "0 / 20 كلمة";
      });

      // Toast/Status notifier helper
      function showNotification(msg, type) {
        statusMessage.textContent = msg;
        statusMessage.classList.remove("hidden");
        
        if (type === "success") {
          statusMessage.className = "p-3 rounded-xl text-center text-xs font-bold transition-all duration-300 bg-emerald-50 text-emerald-800 border border-emerald-200";
        } else {
          statusMessage.className = "p-3 rounded-xl text-center text-xs font-bold transition-all duration-300 bg-red-50 text-red-800 border border-red-200";
        }
      }
    </script>
  </body>
</html>
